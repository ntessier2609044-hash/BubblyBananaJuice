<!DOCTYPE html>
<html>
  <head>
    <title>CatPack App - Sign Up</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header id="mainHeader">
      <div class="logo-container">
        <a href="secret_discount.html">
          <img id="appLogo" src="Images/feline_flight_logo.avif" alt="CatPack Logo">
          <h1>CatPack</h1>
        </a>
      </div>
      <a id="homeButton" href="index.html">Home</a>
      <nav id="mainNav">
        <ul>
          
        </ul>
      </nav>
      <div id="copyrightHeader">
        <p>&copy; 2026 CatPack Inc.</p>
      </div>
    </header>

    <main id="mainContent">
      <section id="signupSection">
        <h2>Sign Up</h2>
        <input type="text" id="newUsername" placeholder="Create Username">
        <input type="password" id="newPassword" placeholder="Create Password">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <p><i>Password must be 8 characters long, have at least 1 uppercase letter, and at least 1 special character.</i></p>
        <button id="createAccountButton">Create Account</button>
        <p id="signupMessage"></p>
      </section>
    </main>

    <footer id="mainFooter">
      <nav class="footer-nav">
        <ul>
          <li><a href="faq.html">FAQ</a></li>
          <li><a href="models.html">Models</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
      </nav>
    </footer>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const usernameInput = document.getElementById('newUsername');
        const passwordInput = document.getElementById('newPassword');
        const confirmInput = document.getElementById('confirmPassword');
        const button = document.getElementById('createAccountButton');
        const message = document.getElementById('signupMessage');

        function isValidPassword(password) {
          return password.length >= 8 && /[A-Z]/.test(password) && /[^A-Za-z0-9]/.test(password);
        }

        button.addEventListener('click', function () {
          const username = usernameInput.value.trim();
          const password = passwordInput.value;
          const confirmPassword = confirmInput.value;

          if (!username || !password || !confirmPassword) {
            message.textContent = 'Please complete all fields.';
            return;
          }

          if (password !== confirmPassword) {
            message.textContent = 'Passwords do not match.';
            return;
          }

          if (!isValidPassword(password)) {
            message.textContent = 'Make sure your password meets the requirements.';
            return;
          }

          // Get existing users database
          let users = JSON.parse(localStorage.getItem('catpackUsers')) || [];

          // Check if username already exists
          if (users.some(user => user.username === username)) {
            message.textContent = 'Username already exists. Please choose a different one.';
            return;
          }

          // Create new user object
          const newUser = {
            username: username,
            password: password,
            createdAt: new Date().toISOString()
          };

          // Add new user to database
          users.push(newUser);
          localStorage.setItem('catpackUsers', JSON.stringify(users));

          // Set current logged-in user
          localStorage.setItem('catpackCurrentUser', username);

          window.location.href = 'home.html';
        });
      });
    </script>
  </body>
</html>
