<!DOCTYPE html>
<html>
  <head>
    <title>CatPack App - Secret Discount</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header id="mainHeader">
      <div class="logo-container">
        <a href="secret_discount.html">
          <img id="appLogo" src="Images/feline_flight_logo.avif" alt="CatPack Logo">
          <h1>CatPack</h1>
        </a>
      </div>
      <a id="homeButton" href="home.html">Home</a>
      <nav id="mainNav">
        <ul>
          <!-- Main navigation links go here if needed -->
        </ul>
      </nav>
      <div id="copyrightHeader">
        <p>&copy; 2026 CatPack Inc.</p>
      </div>
    </header>

    <main id="mainContent">
      <section id="secretDiscountSection">
        <h2>Unlock Your Discount!</h2>
        <p>Enter the secret code below to reveal your special offer.</p>
        <input type="text" id="discountCodeInput" placeholder="Enter code here">
        <button id="unlockDiscountButton">Unlock Discount</button>
        <p id="discountMessage"></p>
      </section>
    </main>

    <footer id="mainFooter">
      <nav class="footer-nav">
        <ul>
          <li><a href="faq.html">FAQ</a></li>
          <li><a href="models.html">Models</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
      </nav>
    </footer>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const input = document.getElementById('discountCodeInput');
        const button = document.getElementById('unlockDiscountButton');
        const message = document.getElementById('discountMessage');

        function unlockDiscount() {
          if (input.value.trim().toUpperCase() === 'MEOW') {
            alert("You've unlocked 15% off your next purchase!");
            message.textContent = "You've unlocked 15% off your next purchase!";
          } else {
            message.textContent = 'Enter the secret code MEOW to unlock the discount.';
          }
        }

        button.addEventListener('click', unlockDiscount);
        input.addEventListener('keydown', function (event) {
          if (event.key === 'Enter') {
            unlockDiscount();
          }
        });
      });
    </script>
  </body>
</html>
